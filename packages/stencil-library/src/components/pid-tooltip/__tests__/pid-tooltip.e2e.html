<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>PID Tooltip Test</title>
  <script src="../../../../../build/pid-component.esm.js" type="module"></script>
  <style>
    body {
      padding: 50px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
<pid-tooltip text="This is the tooltip text that appears on hover">
  <span slot="trigger">Hover over the info icon</span>
</pid-tooltip>

<pid-tooltip position="top" text="Top positioned tooltip">
  <span slot="trigger">Top tooltip</span>
</pid-tooltip>

<pid-tooltip position="bottom" text="Bottom positioned tooltip">
  <span slot="trigger">Bottom tooltip</span>
</pid-tooltip>
</body>
</html>
