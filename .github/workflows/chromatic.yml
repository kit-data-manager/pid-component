name: "Chromatic"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Build all packages
        run: npx lerna run build
      - name: Run Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          autoAcceptChanges: ${{ github.ref == 'refs/heads/main' }}
          exitZeroOnChanges: true
          zip: true
          buildScriptName: build-storybook:root
      - name: Comment PR with Chromatic results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const buildUrl = '${{ steps.chromatic.outputs.buildUrl }}' || 'https://www.chromatic.com';
            const changeCount = '${{ steps.chromatic.outputs.changeCount }}' || '0';
            const hasChanges = changeCount > 0 ? '🔍' : '✅';
            const comment = `## 🎨 Chromatic Visual Tests

            ${hasChanges} ${changeCount > 0 ? 'Visual changes detected' : 'No visual changes'}

            ### Review
            [**View in Chromatic**](${buildUrl})

            *Chromatic provides automated visual testing and review for component changes.*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true
